<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CupMixer — Sorteo de Equipos</title>
<style>
:root {
  --bg:         #061310;
  --surf-0:     #0D2018;
  --surf-1:     #122A1C;
  --surf-2:     #183523;
  --border:     #204830;
  --border-sub: #163C26;
  --em:         #10B981;
  --em-bright:  #34D399;
  --em-dim:     rgba(16,185,129,.13);
  --em-text:    #34D399;
  --gold:       #F0C040;
  --gold-dim:   rgba(240,192,64,.10);
  --gold-text:  #F0C040;
  --red-dim:    rgba(224,112,112,.10);
  --txt:        #DCEEE6;
  --txt-muted:  #537A65;
  --txt-faint:  #2D4D3C;
  --r:    10px;
  --r-sm: 6px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
@media (prefers-color-scheme: light) { :root {
  --bg:#E4F2EC;--surf-0:#FFFFFF;--surf-1:#EEF9F4;--surf-2:#E4F2EC;
  --border:#A8D9BC;--border-sub:#C8EAD8;
  --em:#059669;--em-bright:#047857;--em-dim:rgba(5,150,105,.09);--em-text:#047857;
  --gold:#A07800;--gold-dim:rgba(160,120,0,.09);--gold-text:#7A5A00;
  --red-dim:rgba(200,60,60,.08);
  --txt:#091A10;--txt-muted:#3C6B50;--txt-faint:#90B5A0;
}}
:root[data-theme="dark"] {
  --bg:#061310;--surf-0:#0D2018;--surf-1:#122A1C;--surf-2:#183523;
  --border:#204830;--border-sub:#163C26;
  --em:#10B981;--em-bright:#34D399;--em-dim:rgba(16,185,129,.13);--em-text:#34D399;
  --gold:#F0C040;--gold-dim:rgba(240,192,64,.10);--gold-text:#F0C040;
  --red-dim:rgba(224,112,112,.10);
  --txt:#DCEEE6;--txt-muted:#537A65;--txt-faint:#2D4D3C;
}
:root[data-theme="light"] {
  --bg:#E4F2EC;--surf-0:#FFFFFF;--surf-1:#EEF9F4;--surf-2:#E4F2EC;
  --border:#A8D9BC;--border-sub:#C8EAD8;
  --em:#059669;--em-bright:#047857;--em-dim:rgba(5,150,105,.09);--em-text:#047857;
  --gold:#A07800;--gold-dim:rgba(160,120,0,.09);--gold-text:#7A5A00;
  --red-dim:rgba(200,60,60,.08);
  --txt:#091A10;--txt-muted:#3C6B50;--txt-faint:#90B5A0;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--txt); font-family:var(--font); font-size:15px; line-height:1.55; min-height:100vh; }
.app { max-width:1100px; margin:0 auto; padding:0 20px 80px; }

/* TOP BAR */
.top-bar { display:flex; align-items:center; justify-content:space-between; padding:18px 0 16px; border-bottom:1px solid var(--border-sub); }
.brand { display:flex; align-items:center; gap:10px; }
.brand-icon { width:34px; height:34px; background:var(--em); border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.brand-icon svg { width:18px; height:18px; }
.brand-name { font-size:20px; font-weight:900; letter-spacing:-.02em; color:var(--txt); line-height:1; }
.brand-name span { color:var(--em-text); }
.header-pill { display:inline-flex; align-items:center; gap:7px; background:var(--surf-0); border:1px solid var(--border); border-radius:100px; padding:5px 13px; font-size:13px; font-weight:600; color:var(--txt-muted); font-variant-numeric:tabular-nums; flex-shrink:0; }
.pill-dot { width:7px; height:7px; border-radius:50%; background:var(--em); flex-shrink:0; }

/* TOURNAMENT NAME */
.tournament-section { padding:28px 0 26px; border-bottom:1px solid var(--border-sub); margin-bottom:28px; }
.tourney-label { font-size:10px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--txt-faint); margin-bottom:8px; }
.tourney-wrap { position:relative; display:inline-block; width:100%; max-width:560px; }
.tourney-input { width:100%; background:transparent; border:none; border-bottom:2px solid var(--border); color:var(--txt); font-family:var(--font); font-size:clamp(22px,4vw,34px); font-weight:900; letter-spacing:-.01em; padding:4px 32px 8px 0; outline:none; transition:border-color .2s; text-transform:uppercase; }
.tourney-input:focus { border-color:var(--em); }
.tourney-input::placeholder { color:var(--txt-faint); font-weight:400; text-transform:none; font-size:clamp(18px,3vw,26px); }
.tourney-cursor { position:absolute; right:0; bottom:10px; font-size:13px; color:var(--txt-faint); pointer-events:none; transition:color .2s; }
.tourney-input:focus ~ .tourney-cursor { color:var(--em-text); }

/* MAIN GRID */
.main-grid { display:grid; grid-template-columns:320px 1fr; gap:20px; align-items:start; }
@media (max-width:740px) { .main-grid { grid-template-columns:1fr; } }

/* PANEL */
.panel { background:var(--surf-0); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
.pinner { padding:22px; }
.divider { height:1px; background:var(--border-sub); }

/* SEC HEAD */
.eyebrow { font-size:10px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--txt-faint); margin-bottom:3px; }
.sec-title { font-size:15px; font-weight:800; text-transform:uppercase; letter-spacing:.03em; color:var(--txt); }
.sec-row { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:18px; }
.tally { font-size:12px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--txt-muted); background:var(--surf-1); border:1px solid var(--border); border-radius:100px; padding:3px 10px; white-space:nowrap; margin-top:2px; }

/* INPUT */
.input-row { display:flex; gap:8px; margin-bottom:14px; }
.text-input { flex:1; background:var(--surf-1); border:1px solid var(--border); border-radius:var(--r-sm); color:var(--txt); font-family:var(--font); font-size:14px; padding:9px 13px; outline:none; transition:border-color .15s; }
.text-input:focus { border-color:var(--em); }
.text-input::placeholder { color:var(--txt-faint); }
.text-input.error { border-color:#E07070; animation:shake .3s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.btn-add { background:var(--em-dim); border:1px solid var(--em); border-radius:var(--r-sm); color:var(--em-text); font-family:var(--font); font-size:13px; font-weight:700; padding:9px 14px; cursor:pointer; transition:background .15s,color .15s; white-space:nowrap; }
.btn-add:hover { background:var(--em); color:#061310; }

/* PLAYER LIST */
.players-list { max-height:310px; overflow-y:auto; display:flex; flex-direction:column; gap:3px; margin-bottom:12px; }
.players-list::-webkit-scrollbar { width:3px; }
.players-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.empty-msg { padding:24px 12px; text-align:center; color:var(--txt-faint); font-size:13px; }
.player-item { display:flex; align-items:center; gap:9px; background:var(--surf-1); border:1px solid var(--border-sub); border-radius:var(--r-sm); padding:7px 9px 7px 12px; animation:itemIn .18s ease; }
@keyframes itemIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:none} }
.p-num { font-size:11px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--txt-faint); min-width:20px; text-align:right; }
.p-name { flex:1; font-size:13.5px; font-weight:500; color:var(--txt); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.btn-rm { background:none; border:none; color:var(--txt-faint); cursor:pointer; font-size:16px; line-height:1; padding:2px 5px; border-radius:4px; transition:color .12s,background .12s; flex-shrink:0; }
.btn-rm:hover { color:#E07070; background:rgba(224,112,112,.1); }
.btn-ghost { background:none; border:none; color:var(--txt-faint); font-family:var(--font); font-size:12px; cursor:pointer; padding:3px 0; text-decoration:underline; text-underline-offset:2px; transition:color .12s; }
.btn-ghost:hover { color:#E07070; }

/* CONFIG */
.config-cluster { display:grid; grid-template-columns:1fr 88px; gap:12px; align-items:end; margin:18px 0 12px; }
.field-label { font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--txt-muted); margin-bottom:6px; }
.num-input { background:var(--surf-1); border:1px solid var(--border); border-radius:var(--r-sm); color:var(--txt); font-family:var(--font); font-size:24px; font-weight:900; font-variant-numeric:tabular-nums; padding:10px; text-align:center; outline:none; width:100%; transition:border-color .15s; }
.num-input:focus { border-color:var(--em); }
.stat-box { text-align:center; }
.stat-num { display:block; font-size:38px; font-weight:900; line-height:1; color:var(--em-text); font-variant-numeric:tabular-nums; }
.stat-lbl { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--txt-faint); }
.breakdown { background:var(--surf-1); border:1px solid var(--border-sub); border-radius:var(--r-sm); padding:9px 13px; font-size:13px; color:var(--txt-muted); margin-bottom:18px; display:flex; flex-wrap:wrap; gap:4px 12px; }
.breakdown b { color:var(--txt); font-weight:700; }
.chip-ok   { color:var(--em-text);   font-weight:600; }
.chip-warn { color:var(--gold-text); font-weight:600; }

/* DRAW BUTTON */
.btn-draw { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; background:var(--em); border:none; border-radius:var(--r-sm); color:#061310; font-family:var(--font); font-size:14px; font-weight:900; letter-spacing:.12em; text-transform:uppercase; padding:15px; cursor:pointer; transition:opacity .15s,transform .1s; }
.btn-draw:hover:not(:disabled) { opacity:.88; }
.btn-draw:active:not(:disabled) { transform:scale(.98); }
.btn-draw:disabled { opacity:.22; cursor:not-allowed; }
.btn-draw svg { width:17px; height:17px; flex-shrink:0; }

/* RESULTS */
.results-wrap { display:none; }
.results-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:20px; }
.btn-redraw { display:flex; align-items:center; gap:6px; background:var(--surf-1); border:1px solid var(--border); border-radius:var(--r-sm); color:var(--txt-muted); font-family:var(--font); font-size:12px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; padding:8px 13px; cursor:pointer; transition:border-color .15s,color .15s; white-space:nowrap; flex-shrink:0; }
.btn-redraw:hover { border-color:var(--em); color:var(--em-text); }
.btn-redraw svg { width:14px; height:14px; }

/* TEAM CARDS */
.teams-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(185px,1fr)); gap:12px; }
.team-card { background:var(--surf-1); border:1px solid var(--border-sub); border-radius:var(--r-sm); overflow:hidden; animation:cardIn .35s ease backwards; }
@keyframes cardIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.tc-header { padding:11px 13px 9px; }
.tc-stripe { height:3px; border-radius:2px; margin-bottom:9px; }
.tc-eyebrow { font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--txt-faint); margin-bottom:1px; }
.tc-name { font-size:16px; font-weight:900; text-transform:uppercase; letter-spacing:.03em; line-height:1.1; margin-bottom:6px; cursor:text; }
.tc-name:hover { text-decoration:underline; text-decoration-style:dashed; text-underline-offset:3px; }
.tc-name-input { background:transparent; border:none; border-bottom:2px solid var(--em); color:inherit; font-family:var(--font); font-size:16px; font-weight:900; text-transform:uppercase; letter-spacing:.03em; width:100%; outline:none; padding:0 0 2px; margin-bottom:6px; display:block; }
.tc-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; padding:2px 7px; border-radius:100px; }
.tc-badge.complete   { background:var(--em-dim);   color:var(--em-text); }
.tc-badge.incomplete { background:var(--gold-dim);  color:var(--gold-text); }
.tc-slot { display:flex; align-items:center; gap:9px; padding:6px 13px; border-top:1px solid var(--border-sub); }
.slot-n   { font-size:10px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--txt-faint); min-width:14px; text-align:right; }
.slot-txt { font-size:13px; font-weight:500; color:var(--txt); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.slot-txt.vacant { color:var(--txt-faint); font-style:italic; font-weight:400; font-size:12px; }

/* SAVED TOURNAMENTS */
.saved-section { margin-top:20px; background:var(--surf-0); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
.saved-top { padding:20px 22px; display:flex; align-items:center; justify-content:space-between; gap:16px; border-bottom:1px solid var(--border-sub); }
.btn-save { display:flex; align-items:center; gap:7px; background:var(--em-dim); border:1px solid var(--em); border-radius:var(--r-sm); color:var(--em-text); font-family:var(--font); font-size:13px; font-weight:700; padding:9px 16px; cursor:pointer; transition:background .15s,color .15s; white-space:nowrap; flex-shrink:0; }
.btn-save:hover:not(:disabled) { background:var(--em); color:#061310; }
.btn-save:disabled { opacity:.28; cursor:not-allowed; }
.btn-save svg { width:15px; height:15px; }
.saved-list { padding:14px 22px 20px; display:flex; flex-direction:column; gap:8px; }
.saved-empty { text-align:center; color:var(--txt-faint); font-size:13px; padding:20px 0; }
.saved-card { display:flex; align-items:center; gap:12px; background:var(--surf-1); border:1px solid var(--border-sub); border-radius:var(--r-sm); padding:12px 14px; animation:itemIn .2s ease; }
.saved-card-body { flex:1; min-width:0; }
.saved-card-name { font-size:14px; font-weight:700; color:var(--txt); margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.saved-card-meta { font-size:12px; color:var(--txt-muted); }
.saved-card-actions { display:flex; gap:6px; flex-shrink:0; }
.btn-load { background:var(--em-dim); border:1px solid var(--em); border-radius:var(--r-sm); color:var(--em-text); font-family:var(--font); font-size:12px; font-weight:700; padding:6px 12px; cursor:pointer; transition:background .15s,color .15s; }
.btn-load:hover { background:var(--em); color:#061310; }
.btn-del { background:none; border:1px solid var(--border); border-radius:var(--r-sm); color:var(--txt-faint); font-family:var(--font); font-size:15px; padding:5px 10px; cursor:pointer; transition:color .12s,border-color .12s,background .12s; line-height:1; }
.btn-del:hover { color:#E07070; border-color:#E07070; background:var(--red-dim); }

/* TOAST */
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--em); color:#061310; font-family:var(--font); font-size:13px; font-weight:700; padding:10px 20px; border-radius:100px; opacity:0; transition:opacity .2s,transform .2s; pointer-events:none; z-index:300; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* OVERLAY */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(4px); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200; opacity:0; pointer-events:none; transition:opacity .2s; }
.overlay.on { opacity:1; pointer-events:all; }
.spin-ring { width:56px; height:56px; border:3px solid rgba(16,185,129,.2); border-top-color:var(--em); border-radius:50%; animation:spinning .7s linear infinite; margin-bottom:22px; }
@keyframes spinning { to{transform:rotate(360deg)} }
.overlay-txt { color:#fff; font-size:14px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; }

*:focus-visible { outline:2px solid var(--em); outline-offset:2px; }
@media (prefers-reduced-motion:reduce) { *,*::before,*::after { animation-duration:.001ms!important; transition-duration:.001ms!important; } }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="spin-ring"></div>
  <p class="overlay-txt">Sorteando…</p>
</div>

<div class="toast" id="toast"></div>

<div class="app">

  <!-- TOP BAR -->
  <header class="top-bar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#061310" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2h12l-1.5 9A5.5 5.5 0 0 1 12 16a5.5 5.5 0 0 1-4.5-5L6 2z"/>
          <path d="M6 2H3a1 1 0 0 0-1 1v2a4 4 0 0 0 4 4"/>
          <path d="M18 2h3a1 1 0 0 1 1 1v2a4 4 0 0 1-4 4"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
          <line x1="12" y1="16" x2="12" y2="22"/>
        </svg>
      </div>
      <div class="brand-name">Cup<span>Mixer</span></div>
    </div>
    <div class="header-pill">
      <span class="pill-dot"></span>
      <span id="headerCount">0 jugadores</span>
    </div>
  </header>

  <!-- TOURNAMENT NAME -->
  <section class="tournament-section">
    <div class="tourney-label">Nombre del torneo</div>
    <div class="tourney-wrap">
      <input type="text" class="tourney-input" id="tourneyName"
        placeholder="Escribe el nombre del torneo…" autocomplete="off" maxlength="60" />
      <span class="tourney-cursor">✎</span>
    </div>
  </section>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- REGISTRY -->
    <aside>
      <div class="panel">
        <div class="pinner">
          <div class="sec-row">
            <div>
              <div class="eyebrow">Registro</div>
              <div class="sec-title">Jugadores</div>
            </div>
            <span class="tally" id="tally">0</span>
          </div>
          <div class="input-row">
            <input type="text" class="text-input" id="playerInput"
              placeholder="Nombre del jugador" autocomplete="off" />
            <button class="btn-add" id="addBtn">+ Agregar</button>
          </div>
          <div class="players-list" id="playersList">
            <div class="empty-msg">Aún no hay jugadores registrados.</div>
          </div>
          <button class="btn-ghost" id="clearBtn">Eliminar todos</button>
        </div>
      </div>
    </aside>

    <!-- DRAW + RESULTS -->
    <div>
      <div class="panel">
        <div class="pinner">
          <div class="eyebrow">Configuración</div>
          <div class="sec-title">Sorteo</div>
          <div class="config-cluster">
            <div>
              <div class="field-label">Jugadores por equipo</div>
              <input type="number" class="num-input" id="teamSize" min="1" max="99" value="5" />
            </div>
            <div class="stat-box">
              <span class="stat-num" id="statTeams">—</span>
              <span class="stat-lbl">Equipos</span>
            </div>
          </div>
          <div class="breakdown" id="breakdown">
            Registra jugadores para ver la distribución.
          </div>
          <button class="btn-draw" id="drawBtn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 3 21 3 21 8"/>
              <line x1="4" y1="20" x2="21" y2="3"/>
              <polyline points="21 16 21 21 16 21"/>
              <line x1="15" y1="15" x2="21" y2="21"/>
            </svg>
            Realizar Sorteo
          </button>
        </div>

        <div class="results-wrap" id="resultsWrap">
          <div class="divider"></div>
          <div class="pinner">
            <div class="results-head">
              <div>
                <div class="eyebrow">Resultado</div>
                <div class="sec-title">Equipos Formados</div>
              </div>
              <button class="btn-redraw" id="redrawBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="1 4 1 10 7 10"/>
                  <path d="M3.51 15a9 9 0 1 0 .49-3.75"/>
                </svg>
                Volver a Sortear
              </button>
            </div>
            <div class="teams-grid" id="teamsGrid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SAVED TOURNAMENTS -->
  <div class="saved-section">
    <div class="saved-top">
      <div>
        <div class="eyebrow">Historial</div>
        <div class="sec-title">Mis Torneos</div>
      </div>
      <button class="btn-save" id="saveBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Guardar Torneo
      </button>
    </div>
    <div class="saved-list" id="savedList">
      <div class="saved-empty">No hay torneos guardados aún.</div>
    </div>
  </div>

</div>

<script>
const TEAM_COLORS = [
  '#10B981','#3B82F6','#E84040','#F59E0B',
  '#8B5CF6','#F97316','#06B6D4','#EC4899',
  '#84CC16','#6366F1','#EF4444','#14B8A6',
  '#A855F7','#FBBF24','#34D399','#60A5FA',
];
const STORAGE_KEY = 'cupmixer_tournaments';

let players       = [];
let currentTeams  = [];
let currentNames  = [];

const $ = id => document.getElementById(id);
const playerInput = $('playerInput');
const addBtn      = $('addBtn');
const playersList = $('playersList');
const tallyEl     = $('tally');
const headerCount = $('headerCount');
const clearBtn    = $('clearBtn');
const teamSizeEl  = $('teamSize');
const statTeams   = $('statTeams');
const breakdownEl = $('breakdown');
const drawBtn     = $('drawBtn');
const resultsWrap = $('resultsWrap');
const teamsGrid   = $('teamsGrid');
const redrawBtn   = $('redrawBtn');
const overlay     = $('overlay');
const tourneyName = $('tourneyName');
const saveBtn     = $('saveBtn');
const savedList   = $('savedList');
const toastEl     = $('toast');

/* ── HELPERS ── */
function pl(n, s, p) { return `${n} ${n === 1 ? s : p}`; }

function toRoman(n) {
  const map = [[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],
    [50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
  let r = '';
  for (const [v, s] of map) { while (n >= v) { r += s; n -= v; } }
  return r;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('es', { day:'numeric', month:'short', year:'numeric' });
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2200);
}

/* ── SAVE BUTTON STATE ── */
function updateSaveBtn() {
  saveBtn.disabled = players.length === 0;
}

/* ── CONFIG ── */
function updateConfig() {
  const size  = parseInt(teamSizeEl.value) || 0;
  const total = players.length;
  if (size < 1 || total < 1) {
    statTeams.textContent = '—';
    breakdownEl.innerHTML = total < 1
      ? 'Registra jugadores para ver la distribución.'
      : 'Define la cantidad de jugadores por equipo.';
    drawBtn.disabled = true;
    return;
  }
  const numTeams = Math.ceil(total / size);
  const rem      = total % size;
  const vacants  = rem === 0 ? 0 : size - rem;
  statTeams.textContent = numTeams;
  breakdownEl.innerHTML = [
    `<b>${pl(numTeams,'equipo','equipos')}</b>`,
    `<b>${size} j/equipo</b>`,
    vacants > 0
      ? `<span class="chip-warn">${pl(vacants,'vacante','vacantes')}</span>`
      : `<span class="chip-ok">sin vacantes</span>`,
  ].join(' · ');
  drawBtn.disabled = false;
}

/* ── PLAYERS ── */
function renderPlayers() {
  const n = players.length;
  tallyEl.textContent     = n;
  headerCount.textContent = pl(n, 'jugador', 'jugadores');
  playersList.innerHTML   = n === 0
    ? '<div class="empty-msg">Aún no hay jugadores registrados.</div>'
    : players.map((name, i) => `
        <div class="player-item">
          <span class="p-num">${i + 1}</span>
          <span class="p-name" title="${name}">${name}</span>
          <button class="btn-rm" data-i="${i}" aria-label="Eliminar ${name}">×</button>
        </div>`).join('');
  updateConfig();
  updateSaveBtn();
}

function addPlayer() {
  const name = playerInput.value.trim();
  if (!name) return;
  if (players.map(p => p.toLowerCase()).includes(name.toLowerCase())) {
    playerInput.classList.add('error');
    setTimeout(() => playerInput.classList.remove('error'), 600);
    return;
  }
  players.push(name);
  playerInput.value = '';
  renderPlayers();
  playerInput.focus();
}

function removePlayer(i) {
  players.splice(i, 1);
  renderPlayers();
  if (players.length === 0) resultsWrap.style.display = 'none';
}

/* ── DRAW ── */
function performDraw() {
  const size     = parseInt(teamSizeEl.value);
  const numTeams = Math.ceil(players.length / size);
  if (numTeams < 1) return;
  overlay.classList.add('on');
  drawBtn.disabled = true;
  setTimeout(() => {
    const shuffled = shuffle(players);
    const teams    = Array.from({ length: numTeams }, (_, t) =>
      shuffled.slice(t * size, t * size + size)
    );
    renderTeams(teams, size, null);
    overlay.classList.remove('on');
    drawBtn.disabled = false;
    resultsWrap.style.display = 'block';
    setTimeout(() => resultsWrap.scrollIntoView({ behavior:'smooth', block:'nearest' }), 80);
  }, 900);
}

function renderTeams(teams, teamSize, savedNames) {
  currentTeams = teams;
  currentNames = savedNames
    ? [...savedNames]
    : teams.map((_, i) => toRoman(i + 1));
  teamsGrid.innerHTML = '';
  teams.forEach((tp, i) => {
    const color   = TEAM_COLORS[i % TEAM_COLORS.length];
    const vacants = teamSize - tp.length;
    const slots   = Array.from({ length: teamSize }, (_, s) =>
      s < tp.length
        ? `<div class="tc-slot"><span class="slot-n">${s+1}</span><span class="slot-txt">${tp[s]}</span></div>`
        : `<div class="tc-slot"><span class="slot-n">${s+1}</span><span class="slot-txt vacant">— Vacante —</span></div>`
    ).join('');
    const badge = vacants === 0
      ? `<span class="tc-badge complete">✓ Completo</span>`
      : `<span class="tc-badge incomplete">${pl(vacants,'vacante','vacantes')}</span>`;
    const card = document.createElement('div');
    card.className = 'team-card';
    card.style.animationDelay = `${i * 70}ms`;
    card.innerHTML = `
      <div class="tc-header">
        <div class="tc-stripe" style="background:${color}"></div>
        <div class="tc-eyebrow">Equipo ${i + 1}</div>
        <div class="tc-name" style="color:${color}">${currentNames[i]}</div>
        ${badge}
      </div>
      <div class="tc-slots">${slots}</div>`;
    card.querySelector('.tc-name').addEventListener('click', function() {
      makeNameEditable(this, i);
    });
    teamsGrid.appendChild(card);
  });
}

function makeNameEditable(el, index) {
  const original    = el.textContent;
  const color       = el.style.color;
  const input       = document.createElement('input');
  input.type        = 'text';
  input.value       = original;
  input.className   = 'tc-name-input';
  input.style.color = color;
  el.replaceWith(input);
  input.focus();
  input.select();
  function commit() {
    const newName = input.value.trim() || original;
    el.textContent = newName;
    currentNames[index] = newName;
    input.replaceWith(el);
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  input.blur();
    if (e.key === 'Escape') { input.value = original; input.blur(); }
  });
}

/* ── STORAGE ── */
function getSaved() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveTournament() {
  const name = tourneyName.value.trim() || 'Torneo sin nombre';
  const size = parseInt(teamSizeEl.value) || 5;
  const entry = {
    id:        Date.now().toString(),
    name,
    savedAt:   new Date().toISOString(),
    players:   [...players],
    teamSize:  size,
    teams:     currentTeams.length ? currentTeams.map(t => [...t]) : [],
    teamNames: [...currentNames],
  };
  const saved = getSaved();
  saved.unshift(entry);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  renderSaved();
  showToast(`"${name}" guardado`);
}

function loadTournament(id) {
  const t = getSaved().find(x => x.id === id);
  if (!t) return;
  players = [...t.players];
  tourneyName.value = t.name;
  teamSizeEl.value  = t.teamSize;
  renderPlayers();
  if (t.teams && t.teams.length > 0) {
    renderTeams(t.teams, t.teamSize, t.teamNames);
    resultsWrap.style.display = 'block';
  } else {
    currentTeams = [];
    currentNames = [];
    resultsWrap.style.display = 'none';
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
  showToast(`"${t.name}" cargado`);
}

function deleteTournament(id) {
  const saved   = getSaved();
  const target  = saved.find(x => x.id === id);
  if (!target) return;
  if (!confirm(`¿Eliminar "${target.name}"?`)) return;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved.filter(x => x.id !== id)));
  renderSaved();
  showToast('Torneo eliminado');
}

function renderSaved() {
  const saved = getSaved();
  if (saved.length === 0) {
    savedList.innerHTML = '<div class="saved-empty">No hay torneos guardados aún.</div>';
    return;
  }
  savedList.innerHTML = '';
  saved.forEach(t => {
    const meta = [
      formatDate(t.savedAt),
      pl(t.players.length, 'jugador', 'jugadores'),
      t.teams.length > 0 ? `${t.teams.length} equipos de ${t.teamSize}` : 'sin sortear',
    ].join(' · ');
    const card = document.createElement('div');
    card.className = 'saved-card';
    card.innerHTML = `
      <div class="saved-card-body">
        <div class="saved-card-name">${t.name}</div>
        <div class="saved-card-meta">${meta}</div>
      </div>
      <div class="saved-card-actions">
        <button class="btn-load" data-id="${t.id}">Cargar</button>
        <button class="btn-del"  data-id="${t.id}">×</button>
      </div>`;
    savedList.appendChild(card);
  });
}

/* ── EVENTS ── */
addBtn.addEventListener('click', addPlayer);
playerInput.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });
playersList.addEventListener('click', e => {
  const btn = e.target.closest('.btn-rm');
  if (btn) removePlayer(parseInt(btn.dataset.i));
});
clearBtn.addEventListener('click', () => {
  if (!players.length) return;
  if (confirm('¿Eliminar todos los jugadores registrados?')) {
    players = [];
    currentTeams = [];
    currentNames = [];
    resultsWrap.style.display = 'none';
    renderPlayers();
  }
});
teamSizeEl.addEventListener('input', updateConfig);
drawBtn.addEventListener('click', performDraw);
redrawBtn.addEventListener('click', performDraw);
saveBtn.addEventListener('click', saveTournament);
savedList.addEventListener('click', e => {
  const load = e.target.closest('.btn-load');
  const del  = e.target.closest('.btn-del');
  if (load) loadTournament(load.dataset.id);
  if (del)  deleteTournament(del.dataset.id);
});

/* ── INIT ── */
renderPlayers();
renderSaved();
</script>
</body>
</html>
